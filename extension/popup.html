<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #161b22;
      color: #c9d1d9;
      font-size: 13px;
      line-height: 1.5;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8b949e;
    }
    .status.connected { background: #3fb950; }
    .status.error { background: #f85149; }

    .field { margin-bottom: 12px; }
    label {
      display: block;
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    input:focus { border-color: #58a6ff; outline: none; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .toggle-label { font-size: 13px; }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 38px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #30363d;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #c9d1d9;
      left: 2px;
      top: 2px;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #58a6ff; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    .btn {
      width: 100%;
      padding: 8px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 12px;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn:hover { background: #30363d; }

    .status-text {
      font-size: 11px;
      color: #8b949e;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #30363d;
    }
    .status-text.ok { color: #3fb950; }
    .status-text.err { color: #f85149; }
  </style>
</head>
<body>
  <h1>
    <span class="status" id="status-dot"></span>
    Sideye
  </h1>

  <div class="field">
    <label>Bot URL</label>
    <input type="text" id="bot-url" placeholder="http://localhost:8111">
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Enable overlay</span>
    <label class="toggle">
      <input type="checkbox" id="overlay-toggle" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <button class="btn" id="test-btn">Test Connection</button>

  <div class="status-text" id="status-msg">Checking...</div>

  <script src="browser-polyfill.js"></script>
  <script src="popup.js"></script>
</body>
</html>
